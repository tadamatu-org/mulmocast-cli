<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700;900&display=swap');
    body {
      margin: 0;
      background: transparent;
      width: 100%;
      height: 100%;
    }
    .container {
      width: ${width}px;
      height: ${height}px;
      position: relative;
      margin: 0;
      box-sizing: border-box;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .title {
      width: 90%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      word-wrap: break-word;
      overflow-wrap: break-word;
      font-family: 'M PLUS 1p', Arial, sans-serif;
      font-size: 128px;
      font-weight: 900;
      text-align: center;
      color: white;
      text-shadow: 0px 0px 20px rgba(0, 0, 0, 1.0);
      padding: 20px;
      background: transparent;
      -webkit-text-stroke: 2px #1A1A1A;
      border-radius: 10px;
      ${styles}
    }
    .highlight-important {
      color: #FFC000 !important;
      font-weight: 900 !important;
    }
    .highlight-critical {
      color: #E63946 !important;
      font-weight: 900 !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">${title}</div>
  </div>
</body>
</html>
